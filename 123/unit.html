<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>認購單元系統 | 大貴段森林莊園</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-deep: #1B3022; --forest-mid: #3E5C46; --gold-accent: #b5a478;
            --paper-texture: #F9F8F4; --text-dark: #2C332D;
        }
        body { background-color: var(--paper-texture); font-family: 'Noto Sans TC', sans-serif; margin: 0; padding: 0; }
        .serif { font-family: 'Noto Serif TC', serif; }
        .top-nav { background: #fff; padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        
        /* 登入框樣式 */
        .auth-overlay { width: 90%; max-width: 400px; margin: 50px auto; padding: 30px; background: #fff; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .auth-overlay input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
        .auth-btn { width: 100%; padding: 15px; background: var(--forest-deep); color: var(--gold-accent); border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* 內容區預設隱藏 */
        #protected-content { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
        .data-card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 4px; border-left: 5px solid var(--gold-accent); }
        .data-val { font-size: 1.8rem; color: var(--gold-accent); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; background: #fff; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #f8f9f8; }
        .error-msg { color: #c0392b; background: #fff0f0; padding: 10px; border-radius: 4px; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <nav class="top-nav"><span class="serif">大貴段森林莊園 ‧ 認購單元系統</span></nav>

    <div id="auth-box" class="auth-overlay">
        <h3 class="serif">認購人專屬查詢</h3>
        <p style="font-size: 0.85rem; color: #888;">請輸入認購編號與授權密碼</p>
        <input type="text" id="id-input" placeholder="編號 (如: C1)">
        <input type="password" id="pass-input" placeholder="密碼">
        <button class="auth-btn" onclick="validate()">驗證身分</button>
        <div id="error" class="error-msg"></div>
    </div>

    <main id="protected-content">
        <h2 id="display-title" class="serif" style="color: var(--forest-deep);"></h2>
        <div class="data-card">
            <p>認購總價：<span id="val-price" class="data-val"></span> 萬</p>
            <p>土地單價：<span id="val-unitPrice"></span> 萬/坪</p>
            <p>總面積：<span id="val-totalArea"></span> 坪</p>
        </div>

        <h3 class="serif">面積明細</h3>
        <table>
            <thead><tr><th>地號</th><th>權狀</th><th>公設</th><th>合計</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </main>

    <script src="data.js"></script>

    <script>
        function validate() {
            const id = document.getElementById('id-input').value.trim().toUpperCase();
            const pw = document.getElementById('pass-input').value.trim();
            const errorDiv = document.getElementById('error');

            // 檢查資料庫是否存在
            if (typeof unitDatabase === 'undefined') {
                errorDiv.innerText = "錯誤：找不到資料庫 (data.js)";
                errorDiv.style.display = "block";
                return;
            }

            const data = unitDatabase[id];

            if (data && data.password === pw) {
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('protected-content').style.display = 'block';
                
                // 填充資料
                document.getElementById('display-title').innerText = data.title;
                document.getElementById('val-price').innerText = data.price;
                document.getElementById('val-unitPrice').innerText = data.unitPrice;
                document.getElementById('val-totalArea').innerText = data.totalArea;

                let rows = "";
                data.landDetails.forEach(item => {
                    rows += `<tr><td>${item.landId}</td><td>${item.rightsArea}</td><td>${item.publicArea}</td><td>${item.sumArea}</td></tr>`;
                });
                document.getElementById('table-body').innerHTML = rows;

            } else {
                errorDiv.innerText = "驗證失敗：編號或密碼錯誤";
                errorDiv.style.display = "block";
            }
        }
    </script>
</body>
</html>
